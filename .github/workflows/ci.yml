name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Import check
        run: |
          python -c "import ga, repair"

      - name: Pytest
        shell: bash
        run: |
          set +e
          pytest -q --no-header
          status=$?
          # exit 5 = no tests collected (fine until tests land)
          if [ $status -eq 5 ]; then exit 0; fi
          exit $status

  notebooks:
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Execute light notebooks
        run: |
          pytest --nbmake --nbmake-timeout=300 \
            notebooks/00_literature_review.ipynb \
            notebooks/01_problem_and_setup.ipynb \
            notebooks/02_ga_operators.ipynb \
            notebooks/03_repair_mechanism.ipynb \
            notebooks/05_visualisation_and_results.ipynb

  heavy-notebook:
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Execute experiments notebook
        run: |
          pytest --nbmake --nbmake-timeout=18000 \
            notebooks/04_experiments.ipynb
